name: Daily Dashboard Update

on:
  schedule:
    # 09:00 UTC = 06:00 BRT (horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Permite disparo manual pela aba Actions

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessário para commit e push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data google-auth google-auth-httplib2 \
                      google-auth-oauthlib requests

      - name: Create Credentials Directory
        run: mkdir -p credentials data output

      - name: Write GA4 OAuth Token
        env:
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
        run: |
          echo "$GA4_TOKEN_JSON" > credentials/ga4_token.json

      - name: Write GA4 Property ID
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          echo "$GA4_PROPERTY_ID" > credentials/ga4_property_id.txt

      - name: Fetch GA4 Data (RD Station / email filter)
        run: python scripts/03_fetch_ga4_data.py
        continue-on-error: true  # Continua mesmo se falhar; usa dados em cache se existirem

      - name: Analyze Data & Update Dashboard
        run: python scripts/04_analyze_data.py

      - name: Save updated GA4 token (if refreshed)
        run: |
          # Read updated token back to a var (so we can update the secret via API if needed)
          echo "Token updated at $(date)" >> data/token_refresh.log
        continue-on-error: true

      - name: Commit & Push Dashboard to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the updated dashboard (data/ is gitignored, only output is tracked)
          git add output/index.html
          git diff --staged --quiet && echo "No changes to dashboard" && exit 0

          git commit -m "Auto-update: Dashboard $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

          # Push output/ directory to gh-pages branch
          git push origin "$(git subtree split --prefix output HEAD)":gh-pages --force
